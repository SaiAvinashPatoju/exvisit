name: Rust MCP Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: exvisit-mcp-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: exvisit-mcp-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: exvisit-mcp-macos-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: exvisit-mcp-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} -p exvisit-mcp

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp rust/target/${{ matrix.target }}/release/exvisit-mcp ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item rust/target/${{ matrix.target }}/release/exvisit-mcp.exe ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
