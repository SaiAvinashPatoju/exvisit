name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## ExVisit ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/SaiAvinashPatoju/exvisit/blob/main/CHANGELOG.md) for details.

            ### Install

            **Python (pip):**
            ```
            pip install exvisit==${{ steps.version.outputs.version }}
            ```

            **MCP server (npm):**
            ```
            npx exvisit-mcp
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
