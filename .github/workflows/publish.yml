name: Publish to PyPI

on:
  push:
    tags:
      - "v*"                    # Trigger on version tags: v0.4.0, v1.0.0, etc.
  workflow_dispatch:            # Manual trigger for testing
    inputs:
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"

permissions:
  contents: write               # For creating GitHub releases
  id-token: write               # For OIDC token to PyPI

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate hashes for attestation
        id: hash
        run: |
          cd dist
          python3 << 'EOF'
import hashlib
import os
import base64

hashes = []
for f in sorted([f for f in os.listdir(".") if f.endswith((".tar.gz", ".whl"))]):
    with open(f, "rb") as fp:
        h = hashlib.sha256(fp.read()).hexdigest()
        hashes.append(f"{os.path.basename(f)}={h}")

encoded = base64.b64encode("\n".join(hashes).encode()).decode()
with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
    fh.write(f"hashes={encoded}\n")
EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/exvisit/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
