name: Publish to PyPI

on:
  push:
    tags:
      - "v*"                    # Trigger on version tags: v0.4.0, v1.0.0, etc.
  workflow_dispatch:            # Manual trigger for testing
    inputs:
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"

permissions:
  contents: write               # For creating GitHub releases
  id-token: write               # For OIDC token to PyPI

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate hashes for attestation
        id: hash
        run: |
          cd dist
          python -m pip install hashlib
          echo "hashes=$(python -c 'import hashlib; import os; [print(f"{os.path.basename(f)}={hashlib.sha256(open(f, \"rb\").read()).hexdigest()}") for f in sorted([f for f in os.listdir(\".\") if f.endswith((\".tar.gz\", \".whl\"))])]' | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/exvisit/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
