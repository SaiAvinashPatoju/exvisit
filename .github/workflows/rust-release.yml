# Builds exvisit-mcp for every supported platform and attaches the pre-compiled
# binaries to the GitHub Release created by publish.yml on the same v* tag.
#
# Targets
# ─────────────────────────────────────────────────────────────────────────────
#   exvisit-mcp-linux-amd64        — fully static musl binary, runs on any Linux
#   exvisit-mcp-macos-arm64        — Apple Silicon (M1/M2/M3)
#   exvisit-mcp-macos-x64          — Intel Mac
#   exvisit-mcp-windows-amd64.exe  — Windows 10/11 x64
#
# Downstream install (zero Rust required on end-user machine):
#   Claude Desktop  →  point command in claude_desktop_config.json to the binary
#   Cursor          →  point command in .cursor/mcp.json to the binary
#   npm             →  npm install -g exvisit-mcp  (postinstall downloads binary)
#   Homebrew        →  brew install exvisit/tap/exvisit-mcp  (future tap)
#   Scoop/Winget    →  future manifests

name: Release Rust MCP Binary

on:
  push:
    tags:
      - "v*"          # same trigger as publish.yml — both attach to one GH Release
  workflow_dispatch:  # manual re-run for a specific tag

permissions:
  contents: write     # required to upload release assets

jobs:
  build:
    name: Build · ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # let all platforms finish even if one fails
      matrix:
        include:
          # ── Linux (fully static — no glibc dependency) ─────────────────────
          - target:     x86_64-unknown-linux-musl
            os:         ubuntu-latest
            asset_name: exvisit-mcp-linux-amd64
            musl:       true

          # ── macOS Apple Silicon ────────────────────────────────────────────
          - target:     aarch64-apple-darwin
            os:         macos-latest
            asset_name: exvisit-mcp-macos-arm64
            musl:       false

          # ── macOS Intel ───────────────────────────────────────────────────
          - target:     x86_64-apple-darwin
            os:         macos-13
            asset_name: exvisit-mcp-macos-x64
            musl:       false

          # ── Windows 10/11 x64 ────────────────────────────────────────────
          - target:     x86_64-pc-windows-msvc
            os:         windows-latest
            asset_name: exvisit-mcp-windows-amd64.exe
            musl:       false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the stable Rust toolchain + the target triple for this matrix leg.
      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl-tools provides musl-gcc which the x86_64-unknown-linux-musl linker needs.
      - name: Install musl tools (Linux static build only)
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      # Cache ~/.cargo/registry and the build artefacts between runs.
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Build the release binary. profile.release has strip=true and lto="thin"
      # so the output is already stripped and optimised.
      - name: Build release binary
        working-directory: rust
        run: cargo build --release -p exvisit-mcp --target ${{ matrix.target }}

      # ── Rename & stage the binary ──────────────────────────────────────────
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp rust/target/${{ matrix.target }}/release/exvisit-mcp \
             ${{ matrix.asset_name }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item `
            "rust\target\${{ matrix.target }}\release\exvisit-mcp.exe" `
            "${{ matrix.asset_name }}"

      # Upload to the GitHub Release for this tag (creates release if it doesn't
      # exist yet; appends assets if publish.yml already created it).
      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          # Release notes come from publish.yml; don't overwrite them here.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Optional: create a universal macOS binary (arm64 + x64 → fat binary) ──
  # Uncomment once both individual macOS legs are proven stable.
